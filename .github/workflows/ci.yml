name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality (${{ matrix.os }})
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run python -m ruff check arena_forge tests

      - name: Pytest
        run: uv run python -m pytest -q

      - name: Mypy
        if: matrix.os == 'ubuntu-latest'
        run: uv run python -m mypy

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          short_sha="${GITHUB_SHA::7}"
          commit_subject="$(git log -1 --pretty=%s)"
          echo "tag=edge-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "name=Edge ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT} (${short_sha})" >> "$GITHUB_OUTPUT"
          cat > dist/release-notes.md <<EOF
          Automated prerelease for commit \`${GITHUB_SHA}\`.

          - Branch: \`${GITHUB_REF_NAME}\`
          - Commit message: ${commit_subject}
          - Commit: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Assets:
          - \`ArenaForge.sublime-package\`
          - \`ArenaForge.sublime-package.sha256\`
          EOF

      - name: Build release package
        run: |
          python scripts/build_release.py \
            --mode git-files \
            --output dist/ArenaForge.sublime-package \
            --exclude ".github/*" \
            --exclude "docs/*" \
            --exclude "tests/*" \
            --exclude "scripts/*" \
            --exclude ".venv/*" \
            --exclude ".mypy_cache/*" \
            --exclude ".ruff_cache/*" \
            --exclude ".test-workdir/*" \
            --exclude "__pycache__/*" \
            --exclude "pyproject.toml" \
            --exclude "uv.lock" \
            --exclude ".python-version" \
            --exclude ".gitignore" \
            --exclude ".no-sublime-package"

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          NAME: ${{ steps.meta.outputs.name }}
        run: |
          gh release create "$TAG" \
            dist/ArenaForge.sublime-package \
            dist/ArenaForge.sublime-package.sha256 \
            --title "$NAME" \
            --notes-file dist/release-notes.md \
            --target "$GITHUB_SHA" \
            --prerelease \
            --latest=false
